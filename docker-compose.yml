version: "3.8"
services:
  user_db:
    image: postgres:15
    container_name: oracle_fusion_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: oracle_fusion_db

    ports:
      - "4041:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
